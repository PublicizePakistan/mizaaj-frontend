<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Success</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #0D0D12;
      color: #F5F0E8;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .box {
      padding: 40px;
      border: 1px solid rgba(201,168,76,0.3);
      background: rgba(255,255,255,0.03);
    }
    h2 {
      color: #C9A84C;
      margin-bottom: 10px;
    }
    p {
      color: #aaa;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Verifying your payment...</h2>
  <p>Please wait... this may take a few seconds</p>
</div>

<script>
const API_BASE = "https://web-production-1f476a.up.railway.app";

const user_id = localStorage.getItem("user_id");

async function checkPaymentStatus() {
  if (!user_id) {
    window.location.href = "mizaj-auth.html";
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/check-access/${user_id}`);
    const data = await res.json();

    if (data.access === "test") {
      // ✅ payment confirmed by webhook
      window.location.href = "mizaj-test.html";
    } else {
      // ⏳ still pending
      setTimeout(checkPaymentStatus, 2000);
    }

  } catch (err) {
    console.error(err);
    setTimeout(checkPaymentStatus, 2000);
  }
}

// start checking
checkPaymentStatus();
</script>

</body>
</html>
