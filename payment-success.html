<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment Success</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #0D0D12;
      color: #F5F0E8;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .box {
      padding: 40px;
      border: 1px solid rgba(201,168,76,0.3);
      background: rgba(255,255,255,0.03);
    }
    h2 {
      color: #C9A84C;
      margin-bottom: 10px;
    }
    p {
      color: #aaa;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Processing Payment...</h2>
  <p>Please wait, we are verifying your payment.</p>
</div>

<script>
const API_BASE = "https://web-production-1f476a.up.railway.app";

// ✅ Get user
const user_id = localStorage.getItem("user_id");

// ✅ Get Dialog Pay params
const params = new URLSearchParams(window.location.search);

const merchant_id = params.get("merchant_id");
const database_name = params.get("database_name");
const order_id = params.get("order_id");
const hash = params.get("hash");

async function verifyPayment() {
  if (!user_id) {
    alert("User not found. Please login again.");
    window.location.href = "mizaj-auth.html";
    return;
  }

  if (!merchant_id || !database_name || !order_id || !hash) {
    alert("Invalid payment response");
    window.location.href = "mizaj-payment.html";
    return;
  }

  try {
    const res = await fetch(
      `${API_BASE}/verify-payment?merchant_id=${merchant_id}&database_name=${database_name}&order_id=${order_id}&hash=${hash}&user_id=${user_id}`
    );

    const data = await res.json();

    if (res.ok) {
      // ✅ go to test
      window.location.href = "mizaj-test.html";
    } else {
      alert(data.detail || "Payment verification failed");
      window.location.href = "mizaj-payment.html";
    }

  } catch (err) {
    alert("Error verifying payment");
    window.location.href = "mizaj-payment.html";
  }
}

// 🔥 run immediately
verifyPayment();
</script>

</body>
</html>
